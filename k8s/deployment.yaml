apiVersion: apps/v1
kind: Deployment
metadata:
  name: "agentxyznanao"
  namespace: "agents-ctpy"
  labels:
    app: "agentxyznanao"
    team: "ctpy"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "agentxyznanao"
  template:
    metadata:
      labels:
        app: "agentxyznanao"
        team: "ctpy"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-agentxyznanao"
      containers:
        - name: "agentxyznanao"
          image: "acrshoppoc.azurecr.io/agents/agentxyznanao:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-agentxyznanao"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
